# fly.toml — Origin Retail OS
# Déploiement gratuit Fly.io — accès en ligne 24/7 sans ordinateur local

app = "origin-retail-os"
primary_region = "cdg"

[build]
  builder = "heroku/buildpacks:22"

[env]
  PORT = "8080"
  NODE_ENV = "production"
  WHATSAPP_ENABLED = "false"

[mounts]
  source = "erp_data"
  destination = "/data"

[[services]]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
