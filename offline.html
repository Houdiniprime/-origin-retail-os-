<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#131921">
  <title>Origin Retail OS — Hors ligne</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0f171e 0%, #1a2530 100%);
      color: #eaeded;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 420px;
      width: 100%;
    }
    .icon {
      width: 96px;
      height: 96px;
      margin: 0 auto 32px;
      background: #131921;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 900;
      color: #ff9900;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #fff;
    }
    p {
      font-size: 15px;
      color: #9ba1a6;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: rgba(255,153,0,.1);
      border: 1px solid rgba(255,153,0,.2);
      border-radius: 12px;
      padding: 16px 24px;
      margin-bottom: 24px;
    }
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ff4444;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .status-text { font-size: 14px; font-weight: 600; color: #ff9900; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #ff9900;
      color: #0f171e;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 28px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: all .2s;
    }
    .btn:hover { background: #ffac33; transform: translateY(-1px); }
    .btn:active { transform: scale(.97); }
    .offline-cache-hint {
      margin-top: 40px;
      font-size: 12px;
      color: #555;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">OR</div>
    <h1>Vous êtes hors ligne</h1>
    <p>
      Origin Retail OS nécessite une connexion au serveur local.
      Vérifiez que votre ordinateur hôte est allumé et connecté au même réseau Wi-Fi.
    </p>
    <div class="status-bar">
      <div class="status-dot"></div>
      <span class="status-text">Aucune connexion détectée</span>
    </div>
    <button class="btn" onclick="location.reload()">
      🔄 Réessayer
    </button>
    <p class="offline-cache-hint">
      Les données précédemment consultées restent accessibles.
    </p>
  </div>
  <script>
    // Vérifie périodiquement si la connexion est rétablie
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
