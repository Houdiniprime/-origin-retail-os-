# Configuration Cloudflare Pages - Origin Retail OS
# Documentation: https://developers.cloudflare.com/pages/

name = "origin-retail-os"
pages_build_output_dir = "."

# KV namespace for persistent state storage
# À créer dans le dashboard: https://dash.cloudflare.com/ → Workers & Pages → KV
[[kv_namespaces]]
binding = "ERP_STATE"
id = "erp_state"
preview_id = "erp_state"
