  <script>
    // Enregistrement du Service Worker PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').then(function(reg) {
          console.log('[PWA] Service Worker enregistré, scope:', reg.scope);
          // Vérifier les mises à jour périodiquement
          reg.addEventListener('updatefound', function() {
            var newWorker = reg.installing;
            newWorker.addEventListener('statechange', function() {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('[PWA] Nouvelle version disponible — actualisez la page.');
              }
            });
          });
        }).catch(function(err) {
          console.warn('[PWA] Service Worker échec:', err.message);
        });
      });
      // Écouter les messages du SW (sync, push, etc.)
      navigator.serviceWorker.addEventListener('message', function(event) {
        if (event.data && event.data.type === 'SYNC_TRIGGERED') {
          console.log('[PWA] Synchronisation en arrière-plan déclenchée');
          // L'application écoute cet événement et synchronise automatiquement
        }
      });
    }
    // Détection online/offline
    window.addEventListener('online', function() {
      document.body.classList.remove('is-offline');
      console.log('[PWA] Connexion rétablie');
    });
    window.addEventListener('offline', function() {
      document.body.classList.add('is-offline');
      console.log('[PWA] Mode hors ligne');
    });
    if (!navigator.onLine) {
      document.body.classList.add('is-offline');
    }
  </script>
